name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black isort flake8
      - run: black --check bot/ tests/
      - run: isort --check-only bot/ tests/
      - run: flake8 bot/ tests/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pip-audit
          # aiohttp CVEs ниже требуют версии 3.12+, но aiogram 3.13.1 требует aiohttp<3.11.
          # Игнорируем их до выхода совместимой версии aiogram.
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2025-53643 \
            --ignore-vuln CVE-2025-69223 \
            --ignore-vuln CVE-2025-69224 \
            --ignore-vuln CVE-2025-69225 \
            --ignore-vuln CVE-2025-69226 \
            --ignore-vuln CVE-2025-69227 \
            --ignore-vuln CVE-2025-69228 \
            --ignore-vuln CVE-2025-69229 \
            --ignore-vuln CVE-2025-69230

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Create .env from example
        run: cp .env.example .env
      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          BOT_TOKEN: fake_token_for_tests
          APP_ENV: testing
        run: pytest
