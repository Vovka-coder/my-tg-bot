version: "3.9"

services:
  # ──────────────────────────────────────────
  # Telegram Bot
  # ──────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tg_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./bot:/app/bot       # hot-reload в dev
      - ./logs:/app/logs
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('aiohttp').ClientSession().get('http://localhost:8080/health'))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tg_celery_worker
    restart: unless-stopped
    command: celery -A bot.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - bot_network

  # ──────────────────────────────────────────
  # Celery Beat (планировщик)
  # ──────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tg_celery_beat
    restart: unless-stopped
    command: celery -A bot.tasks beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - bot_network

  # ──────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tg_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Postgres Backup (раз в сутки)
  # ──────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: tg_db_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: sh -c "while true; do sh /backup.sh; sleep 86400; done"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bot_network

volumes:
  postgres_data:
  redis_data:

networks:
  bot_network:
    driver: bridge
