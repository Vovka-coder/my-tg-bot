[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    migrations,
    alembic

[isort]
profile = black
line_length = 100
multi_line_output = 3
include_trailing_comma = True
known_third_party = aiogram,sqlalchemy,redis,celery,openai,anthropic,pydantic

[mypy]
python_version = 3.12
ignore_missing_imports = True
strict = False
warn_unused_ignores = True
